# Claude-Code-Tunnels Configuration
# This file is auto-generated by /setup-orchestrator and can be edited manually.

# Absolute path to the project root directory (where your projects live)
root: /path/to/your/projects

# Path to store credentials (never commit this directory)
archive: /path/to/your/projects/ARCHIVE

# Channel configuration
channels:
  slack:
    enabled: false
  telegram:
    enabled: false
  teams:
    enabled: false
    port: 3978

# Remote workspaces (populated by /setup-remote-project and /setup-remote-workspace)
# Each entry maps a workspace to a remote listener
# Example:
#   - name: my-project/backend
#     host: 10.0.0.5
#     port: 9100
#     token: ""
remote_workspaces: []
